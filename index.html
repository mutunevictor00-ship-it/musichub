<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicHub - Music & DJ Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --primary: #ff0033; --gold: #ffd700; }
        body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', sans-serif; }
        .sidebar { 
            position: fixed; left: 0; top: 0; bottom: 0; width: 280px; 
            background: rgba(15,15,15,0.98); padding: 25px; z-index: 100; 
        }
        .user-icon { font-size: 2.8rem; cursor: pointer; transition: 0.3s; }
        .user-icon:hover { color: var(--primary); transform: scale(1.1); }
        .music-card { 
            background: #1a1a1a; border-radius: 16px; overflow: hidden; 
            transition: all 0.4s; 
        }
        .music-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 20px 40px rgba(255,0,51,0.4); 
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 style="color:var(--primary); font-weight:800;">🎵 MusicHub</h2>
        
        <div class="text-center my-4">
            <i class="fas fa-user-circle user-icon" onclick="toggleAuthModal()"></i>
            <div id="userNameDisplay" class="mt-2 fw-bold"></div>
        </div>

        <div class="mt-4">
            <a href="#" class="d-block py-3 text-white text-decoration-none" onclick="showSection('home')"><i class="fas fa-home me-3"></i>Home</a>
            <a href="#" class="d-block py-3 text-white text-decoration-none" onclick="showSection('discover')"><i class="fas fa-compass me-3"></i>Discover</a>
            <a href="#" class="d-block py-3 text-white text-decoration-none" onclick="showSection('upload')"><i class="fas fa-upload me-3"></i>Upload</a>
            <a href="#" class="d-block py-3 text-white text-decoration-none" onclick="showSection('playlist')"><i class="fas fa-list me-3"></i>Playlist</a>
            <a href="#" class="d-block py-3 text-white text-decoration-none" onclick="showSection('feedback')"><i class="fas fa-comment me-3"></i>Feedback</a>
        </div>
    </div>

    <!-- Main Content -->
    <div style="margin-left: 280px; padding: 30px;">

        <!-- HOME -->
        <div id="home" class="section">
            <h1 class="display-4">Welcome to <span style="color:var(--primary)">MusicHub</span></h1>
            <h3 class="mt-5 mb-4">🔥 Trending Songs</h3>
            <div class="row" id="trendingGrid"></div>
        </div>

        <!-- DISCOVER -->
        <div id="discover" class="section d-none">
            <h3>Discover Music</h3>
            <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search songs or artists..." onkeyup="searchMusic()">
            <div class="row" id="discoverGrid"></div>
        </div>

        <!-- UPLOAD -->
        <div id="upload" class="section d-none">
            <h3>Upload New Music</h3>
            <div class="card p-5 bg-dark">
                <form id="uploadForm">
                    <input type="text" id="title" class="form-control mb-3" placeholder="Song Title" required>
                    <input type="text" id="artist" class="form-control mb-3" placeholder="Artist Name" required>
                    <input type="text" id="genre" class="form-control mb-3" placeholder="Genre" required>
                    <button type="submit" class="btn btn-danger w-100 py-3">🚀 Upload Song</button>
                </form>
            </div>
        </div>

        <!-- PLAYLIST -->
        <div id="playlist" class="section d-none">
            <h3>My Playlist</h3>
            <div id="playlistContent"></div>
        </div>

        <!-- FEEDBACK -->
        <div id="feedback" class="section d-none">
            <h3>Feedback & Comments</h3>
            <textarea id="commentText" class="form-control mb-3" rows="4" placeholder="Write your feedback..."></textarea>
            <button onclick="submitFeedback()" class="btn btn-danger">Submit Feedback</button>
            <div id="feedbackList" class="mt-4"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Account Access</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex gap-2 mb-4">
                        <button class="btn btn-outline-light flex-grow-1" onclick="switchTab(1)">Login</button>
                        <button class="btn btn-outline-light flex-grow-1" onclick="switchTab(2)">Register</button>
                    </div>
                    <div id="loginForm">
                        <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email">
                        <input type="password" id="loginPass" class="form-control mb-3" placeholder="Password">
                        <button onclick="loginUser()" class="btn btn-danger w-100">Login</button>
                    </div>
                    <div id="registerForm" class="d-none">
                        <input type="text" id="regName" class="form-control mb-3" placeholder="Full Name">
                        <input type="email" id="regEmail" class="form-control mb-3" placeholder="Email">
                        <input type="password" id="regPass" class="form-control mb-3" placeholder="Password">
                        <button onclick="registerUser()" class="btn btn-danger w-100">Register</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Secure Password Hashing
        async function hashPassword(password, salt) {
            const encoder = new TextEncoder();
            const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(password), { name: "PBKDF2" }, false, ["deriveBits"]);
            const hashBuffer = await crypto.subtle.deriveBits({ name: "PBKDF2", salt: encoder.encode(salt), iterations: 100000, hash: "SHA-256" }, keyMaterial, 256);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let currentUser = JSON.parse(localStorage.getItem('currentUser')) || null;
        let users = JSON.parse(localStorage.getItem('users')) || [];
        let musicLibrary = JSON.parse(localStorage.getItem('musicLibrary')) || [];
        let playlist = [];
        let feedbacks = JSON.parse(localStorage.getItem('feedbacks')) || [];

        function updateUserUI() {
            document.getElementById('userNameDisplay').textContent = currentUser ? currentUser.name : "Guest";
        }

        async function registerUser() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPass').value;

            if (!name || !email || !password) return alert("All fields are required!");

            if (users.find(u => u.email === email)) return alert("Email already exists!");

            const salt = crypto.randomUUID();
            const hashedPassword = await hashPassword(password, salt);

            users.push({ name, email, salt, hashedPassword });
            localStorage.setItem('users', JSON.stringify(users));
            alert("✅ Registration Successful!");
            switchTab(1);
        }

        async function loginUser() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPass').value;

            const user = users.find(u => u.email === email);
            if (!user) return alert("User not found!");

            const hashedInput = await hashPassword(password, user.salt);
            if (hashedInput === user.hashedPassword) {
                currentUser = { name: user.name, email: user.email };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUserUI();
                bootstrap.Modal.getInstance(document.getElementById('authModal')).hide();
                alert("✅ Login Successful!");
            } else {
                alert("❌ Incorrect Password!");
            }
        }

        function toggleAuthModal() {
            new bootstrap.Modal(document.getElementById('authModal')).show();
        }

        function switchTab(tab) {
            document.getElementById('loginForm').classList.toggle('d-none', tab !== 1);
            document.getElementById('registerForm').classList.toggle('d-none', tab !== 2);
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.add('d-none'));
            document.getElementById(section).classList.remove('d-none');
            if (section === 'home' || section === 'discover') renderMusic(section);
        }

        function renderMusic(section) {
            const grid = document.getElementById(section === 'home' ? 'trendingGrid' : 'discoverGrid');
            grid.innerHTML = '';
            musicLibrary.forEach(track => {
                grid.innerHTML += `
                    <div class="col-md-3 mb-4">
                        <div class="music-card p-3">
                            <h6>${track.title || 'Untitled'}</h6>
                            <small>${track.artist || 'Unknown Artist'}</small>
                            <button class="btn btn-danger btn-sm mt-2" onclick="playTrack(${track.id})">Play</button>
                        </div>
                    </div>`;
            });
        }

        function playTrack(id) {
            alert("🎵 Now Playing - Track ID: " + id);
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const title = document.getElementById('title').value;
            if (title) {
                musicLibrary.unshift({ id: Date.now(), title: title, artist: document.getElementById('artist').value });
                localStorage.setItem('musicLibrary', JSON.stringify(musicLibrary));
                alert("✅ Song Uploaded Successfully!");
                this.reset();
                showSection('home');
            }
        });

        function submitFeedback() {
            if (!currentUser) return alert("Please login first!");
            const text = document.getElementById('commentText').value;
            if (text) {
                feedbacks.unshift({ text, user: currentUser.name, date: new Date().toLocaleDateString() });
                localStorage.setItem('feedbacks', JSON.stringify(feedbacks));
                alert("Thank you for your feedback!");
                document.getElementById('commentText').value = '';
            }
        }

        // Initialize
        updateUserUI();
        showSection('home');
    </script>
</body>
</html>
